spring.application.name=APIGatewayService
server.port=8085

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ── Explicit routes ──────────────────────────────────────────────────────────
# Payment Service – balance, deposit, withdraw, transfer
spring.cloud.gateway.server.webflux.routes[0].id=payment-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://PAYMENTSERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/payment/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1

# ── CORS ─────────────────────────────────────────────────────────────────────
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowCredentials=false